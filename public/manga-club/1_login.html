
<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>IEDUZONE</title>
	<!-- font -->
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
	<link rel="stylesheet" type="text/css" href="ti-icons/css/themify-icons.css">
	<!-- Lib css-->
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.css">
	<link rel='stylesheet' href='css/animate.css'>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fancyapps/fancybox@3.5.2/dist/jquery.fancybox.min.css" />
	<!-- custom css -->
	<link rel="stylesheet" href="css/custom.css" />
	<link rel="stylesheet" href="css/responsive.css" />
	<!-- jquery -->
	<script src="https://code.jquery.com/jquery-2.2.3.js"></script>
</head>
<body>
	<!-- Login -->
	<div class="iedu_login">
		<div class="container">
			<div class="iedu_login__content">
				<div class="login_head">
					<div class="logo">
						<a href="#"><img src="img/logo_color.png" alt="" class="img-responsive"></a>
					</div>
					<div class="login_regis">
						<a href="#">Đăng ký tài khoản mới</a>
					</div>
				</div>
				<div class="login_info">
					<div class="row">
						<div class="col-md-6 col-sm-6 col-xs-12">
							<div class="login_form">
								<h5>Trở thành công dân toàn cầu cùng ieduzone</h5>
								<p>Nơi mọi người chia sẻ, khám phá và học hỏi bất cứ điều gì</p>
								<div class="login_block">
									<h5>Đăng ký nhanh với</h5>
									<ul>
										<li class="login_fb"><a href="#"><i class="fa fa-facebook-square" aria-hidden="true"></i> <span>Facebook</span></a></li>
										<li class="login_gg"><a href="#"><i class="fa fa-google" aria-hidden="true"></i> <span>Gmail</span></a></li>
									</ul>
								</div>
								<div class="login_block">
									<h5>Hoặc đăng nhập bằng</h5>
									<form action="">
										<div class="login_form__content">
											<div class="form_item">
												<input type="text" placeholder="Email hoặc số điện thoại" name="">
											</div>
											<div class="form_item">
												<input type="password" placeholder="Mật khẩu" name="">
											</div>
										</div>
										<div class="login_form__button">
											<button type="">Đăng nhập</button>
											<a href="#">Quên mật khẩu?</a>
										</div>
									</form>
								</div>
							</div>
						</div>
						<div class="col-md-6 col-sm-6 hidden-xs">
							<div class="login_images">
								<img src="img/login_images.png" alt="" class="img-responsive">
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<!-- End Login -->
	<!-- Lib js -->
	<script src="https://cdn.jsdelivr.net/gh/fancyapps/fancybox@3.5.2/dist/jquery.fancybox.min.js"></script>
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>
	<script src='https://cdn.rawgit.com/matthieua/WOW/1.0.1/dist/wow.min.js'></script>
	<!-- Custom js -->
	<script type="text/javascript" src="js/custom.js"></script>
</body>
</html>
